version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: perinatal_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-perinatal_care}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: perinatal_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-perinatal_care}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key}
      UPLOAD_DIR: /app/uploads
    ports:
      - "8000:8000"
    volumes:
      - ./backend/ml/models:/app/ml/models
      - ./backend/data:/app/data
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    container_name: perinatal_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      VITE_API_URL: http://localhost:8000

volumes:
  pgdata:
  uploads:
